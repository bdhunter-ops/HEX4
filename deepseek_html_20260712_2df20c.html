<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>HEX BYPASS v3.0 | Premium Unlocker</title>
    <style>
        /* ─── গ্লোবাল রিসেট ─── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0b0d15;
            color: #c8d6e5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: radial-gradient(circle at 20% 30%, #1a1f2e 0%, #0b0d15 80%);
        }

        /* ─── গ্লাস কার্ড ─── */
        .glass {
            background: rgba(22, 28, 46, 0.75);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(0, 255, 200, 0.15);
            border-radius: 28px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(0, 255, 200, 0.05) inset;
            padding: 36px 32px;
            max-width: 820px;
            width: 100%;
            transition: all 0.3s ease;
        }

        /* ─── হেডার ─── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            font-size: 28px;
            filter: drop-shadow(0 0 8px rgba(0, 255, 200, 0.3));
        }

        .brand h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #00ffc8, #00b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .badge {
            background: rgba(0, 255, 200, 0.08);
            border: 1px solid rgba(0, 255, 200, 0.2);
            padding: 4px 14px;
            border-radius: 60px;
            font-size: 11px;
            font-weight: 600;
            color: #00ffc8;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* ─── পাসওয়ার্ড স্ক্রিন ─── */
        #authScreen {
            display: block;
        }
        #mainScreen {
            display: none;
        }

        .auth-box {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            padding: 20px 0;
        }

        .auth-box .lock-icon {
            font-size: 48px;
            opacity: 0.5;
        }

        .auth-box h2 {
            font-weight: 400;
            font-size: 18px;
            color: #8395a7;
        }

        .input-row {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 400px;
            flex-wrap: wrap;
        }

        .input-row input {
            flex: 1;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 60px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.25s;
            min-width: 180px;
        }

        .input-row input:focus {
            border-color: #00ffc8;
            box-shadow: 0 0 0 3px rgba(0, 255, 200, 0.1);
        }

        .input-row input::placeholder {
            color: #576574;
        }

        .btn-primary {
            padding: 14px 32px;
            background: linear-gradient(135deg, #00ffc8, #00b4ff);
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 14px;
            color: #0b0d15;
            cursor: pointer;
            transition: 0.25s;
            white-space: nowrap;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 15px rgba(0, 255, 200, 0.15);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 255, 200, 0.25);
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .auth-error {
            color: #ff6b6b;
            font-size: 13px;
            min-height: 22px;
            text-align: center;
        }

        /* ─── মেইন প্যানেল ─── */
        .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 22px;
        }

        .toolbar select,
        .toolbar input {
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 60px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
            flex: 1;
            min-width: 140px;
        }

        .toolbar select:focus,
        .toolbar input:focus {
            border-color: #00ffc8;
        }

        .toolbar select option {
            background: #1a1f2e;
        }

        .url-area {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .url-area textarea {
            flex: 1;
            min-height: 70px;
            padding: 16px 18px;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 18px;
            color: #e0e7f0;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            resize: vertical;
            outline: none;
            transition: 0.2s;
            line-height: 1.6;
        }

        .url-area textarea:focus {
            border-color: #00ffc8;
        }

        .action-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .action-row .btn-primary {
            flex: 1;
            text-align: center;
            justify-content: center;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-width: 120px;
            padding: 14px 20px;
        }

        .btn-secondary {
            padding: 14px 24px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 60px;
            color: #c8d6e5;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            text-align: center;
            min-width: 100px;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* ─── টার্মিনাল লগ ─── */
        .terminal {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            padding: 18px 20px;
            max-height: 220px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.7;
            border: 1px solid rgba(255, 255, 255, 0.03);
            margin-bottom: 20px;
            scroll-behavior: smooth;
        }

        .terminal::-webkit-scrollbar {
            width: 4px;
        }
        .terminal::-webkit-scrollbar-thumb {
            background: #00ffc8;
            border-radius: 10px;
        }
        .terminal::-webkit-scrollbar-track {
            background: transparent;
        }

        .log-entry {
            padding: 1px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }
        .log-entry .time {
            color: #576574;
            margin-right: 10px;
            font-size: 11px;
        }
        .log-entry .msg {
            color: #c8d6e5;
        }
        .log-entry.success .msg {
            color: #00ffc8;
        }
        .log-entry.error .msg {
            color: #ff6b6b;
        }
        .log-entry.warn .msg {
            color: #ffd93d;
        }
        .log-entry.info .msg {
            color: #74b9ff;
        }

        /* ─── রেজাল্ট বক্স ─── */
        .result-box {
            background: rgba(0, 255, 200, 0.03);
            border: 1px solid rgba(0, 255, 200, 0.12);
            border-radius: 16px;
            padding: 18px 20px;
            display: none;
            margin-bottom: 18px;
            animation: fadeSlide 0.3s ease;
        }

        .result-box.active {
            display: block;
        }

        @keyframes fadeSlide {
            0% { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .result-box .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #576574;
            margin-bottom: 6px;
        }

        .result-box .url {
            word-break: break-all;
            color: #00ffc8;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            padding: 8px 0 12px 0;
        }

        .result-box .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .result-box .actions button,
        .result-box .actions a {
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .result-box .actions .copy-btn {
            background: rgba(0, 255, 200, 0.12);
            color: #00ffc8;
        }
        .result-box .actions .copy-btn:hover {
            background: rgba(0, 255, 200, 0.2);
        }
        .result-box .actions .open-btn {
            background: #00ffc8;
            color: #0b0d15;
        }
        .result-box .actions .open-btn:hover {
            background: #00e6b5;
        }

        /* ─── ফুটার ─── */
        .footer {
            margin-top: 20px;
            font-size: 11px;
            color: #2d343e;
            text-align: center;
            letter-spacing: 0.5px;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            padding-top: 16px;
        }

        .footer span {
            color: #576574;
        }

        /* ─── স্পিনার ─── */
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid #00ffc8;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ─── রেসপন্সিভ ─── */
        @media (max-width: 600px) {
            .glass {
                padding: 24px 18px;
            }
            .brand h1 {
                font-size: 20px;
            }
            .input-row input,
            .toolbar select,
            .toolbar input {
                font-size: 13px;
                padding: 12px 14px;
            }
            .action-row .btn-primary,
            .btn-secondary {
                font-size: 12px;
                padding: 12px 16px;
                min-width: 80px;
            }
            .url-area textarea {
                min-height: 60px;
                font-size: 13px;
            }
            .terminal {
                font-size: 12px;
                max-height: 160px;
                padding: 14px;
            }
        }

        /* ─── মিনি স্ট্যাটাস ─── */
        .status-mini {
            font-size: 12px;
            color: #576574;
            margin-top: 6px;
            min-height: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-mini .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #576574;
        }
        .status-mini .dot.green {
            background: #00ffc8;
        }
        .status-mini .dot.red {
            background: #ff6b6b;
        }
        .status-mini .dot.yellow {
            background: #ffd93d;
        }
    </style>
</head>
<body>

<div class="glass" id="app">

    <!-- ─── হেডার ─── -->
    <div class="header">
        <div class="brand">
            <span class="brand-icon">⚡</span>
            <h1>HEX BYPASS</h1>
        </div>
        <span class="badge">v3.0 · secure</span>
    </div>

    <!-- ─── অথ স্ক্রিন ─── -->
    <div id="authScreen">
        <div class="auth-box">
            <div class="lock-icon">🔐</div>

                <input type="password" id="authPass" placeholder="••••••••" autofocus />

    <!-- ─── মেইন স্ক্রিন ─── -->
    <div id="mainScreen">

        <!-- টুলবার -->
        <div class="toolbar">
            <select id="moduleSelect">
                <option value="auto">🔍 Auto Detect</option>
                <option value="vplink">VPLink</option>
                <option value="urlking">URLKing</option>
                <option value="earnlink">EarnLink</option>
                <option value="aincrad">Aincrad</option>
                <option value="generic">Generic</option>
            </select>
            <input type="text" id="customApi" placeholder="Custom API (optional)" />
        </div>

        <!-- URL ইনপুট -->
        <div class="url-area">
            <textarea id="urlInput" placeholder="Paste your link here...">https://vplink.in/White54k1</textarea>
        </div>

        <!-- অ্যাকশন বাটন -->
        <div class="action-row">
            <button class="btn-primary" id="bypassBtn">🚀 BYPASS</button>
            <button class="btn-secondary" id="inspectBtn">🔍 INSPECT</button>

        <!-- টার্মিনাল লগ -->

            <div class="log-entry info"><span class="time">[system]</span><span class="msg">Ready. Enter a URL to begin.</span></div>

        <!-- রেজাল্ট বক্স -->
        <div class="result-box" id="resultBox">
            <div class="label">✅ Decrypted Destination</div>
            <div class="url" id="resultUrl"></div>
            <div class="actions">
                <button class="copy-btn" id="copyBtn">📋 COPY</button>
                <a class="open-btn" id="openBtn" href="#" target="_blank">↗ OPEN</a>
            </div>
        </div>

        <!-- মিনি স্ট্যাটাস -->
        <div class="status-mini" id="statusMini">
            <span class="dot green"></span> <span id="statusText">Ready</span>
        </div>

        <div class="footer">
            <span>//</span> ENCRYPTED SESSION · ALL RIGHTS RESERVED <span>//</span>
        </div>
    </div>
</div>

<script>
    // ──────────────────────────────────────────────────────────────
    //  কনফিগারেশন
    // ──────────────────────────────────────────────────────────────
    const CONFIG = {
        PASSWORD: 'RAJA',
        VERSION: 'v3.0',
        APP_NAME: 'HEX BYPASS'
    };

    // ──────────────────────────────────────────────────────────────
    //  বাইপাস API গুলো (মডিউল ভিত্তিক)
    // ──────────────────────────────────────────────────────────────
    const BYPASS_MODULES = {
        vplink: {
            match: ['vplink.in', 'vplink'],
            apis: [
                'https://api.bypass.vip/bypass?url={URL}',
                'https://bypass.bot.nu/bypass2?url={URL}',
                'https://api.bypasser.workers.dev/bypass?url={URL}'
            ]
        },
        urlking: {
            match: ['urlking.in', 'urlking'],
            apis: [
                'https://api.bypass.vip/bypass?url={URL}',
                'https://bypass.bot.nu/bypass2?url={URL}'
            ]
        },
        earnlink: {
            match: ['earnlink', 'earn.link'],
            apis: [
                'https://api.bypass.vip/bypass?url={URL}',
                'https://bypass.bot.nu/bypass2?url={URL}'
            ]
        },
        aincrad: {
            match: ['aincrad', 'aincrad.pro'],
            apis: [
                'https://api.bypass.vip/bypass?url={URL}',
                'https://bypass.bot.nu/bypass2?url={URL}'
            ]
        },
        generic: {
            apis: [
                'https://api.bypass.vip/bypass?url={URL}',
                'https://bypass.bot.nu/bypass2?url={URL}',
                'https://api.bypasser.workers.dev/bypass?url={URL}',
                'https://shorter.kingo.workers.dev/bypass?url={URL}'
            ]
        }
    };

    // ──────────────────────────────────────────────────────────────
    //  DOM রেফারেন্স
    // ──────────────────────────────────────────────────────────────
    const authScreen = document.getElementById('authScreen');
    const mainScreen = document.getElementById('mainScreen');
    const authPass = document.getElementById('authPass');
    const authBtn = document.getElementById('authBtn');
    const authError = document.getElementById('authError');

    const moduleSelect = document.getElementById('moduleSelect');
    const customApi = document.getElementById('customApi');
    const urlInput = document.getElementById('urlInput');
    const bypassBtn = document.getElementById('bypassBtn');
    const inspectBtn = document.getElementById('inspectBtn');
    const clearBtn = document.getElementById('clearBtn');
    const terminal = document.getElementById('terminal');
    const resultBox = document.getElementById('resultBox');
    const resultUrl = document.getElementById('resultUrl');
    const copyBtn = document.getElementById('copyBtn');
    const openBtn = document.getElementById('openBtn');
    const statusText = document.getElementById('statusText');
    const statusDot = document.querySelector('.status-mini .dot');

    // ──────────────────────────────────────────────────────────────
    //  লগ ফাংশন
    // ──────────────────────────────────────────────────────────────
    function addLog(message, type = 'info') {
        const entry = document.createElement('div');
        entry.className = 'log-entry ' + type;
        const time = new Date().toLocaleTimeString('en-US', { hour12: false });
        entry.innerHTML = `<span class="time">[${time}]</span><span class="msg">${message}</span>`;
        terminal.appendChild(entry);
        terminal.scrollTop = terminal.scrollHeight;
        // status mini update
        const dot = document.querySelector('.status-mini .dot');
        const txt = document.getElementById('statusText');
        if (type === 'error') {
            dot.className = 'dot red';
            txt.textContent = 'Error';
        } else if (type === 'success') {
            dot.className = 'dot green';
            txt.textContent = 'Success';
        } else if (type === 'warn') {
            dot.className = 'dot yellow';
            txt.textContent = 'Warning';
        } else {
            dot.className = 'dot green';
            txt.textContent = 'Running...';
        }
    }

    function clearLog() {
        terminal.innerHTML = '';
        statusText.textContent = 'Ready';
        statusDot.className = 'dot green';
    }

    // ──────────────────────────────────────────────────────────────
    //  পাসওয়ার্ড অথেনটিকেশন
    // ──────────────────────────────────────────────────────────────
    function handleAuth() {
        const pass = authPass.value.trim();
        if (pass === CONFIG.PASSWORD) {
            authScreen.style.display = 'none';
            mainScreen.style.display = 'block';
            addLog('Access granted. Welcome, RAJA.', 'success');
            addLog('Session established. Ready for operations.', 'info');
        } else {
            authError.textContent = '✗ Invalid access key. Try again.';
            authPass.value = '';
            authPass.focus();
            setTimeout(() => { authError.textContent = ''; }, 2500);
        }
    }

    authBtn.addEventListener('click', handleAuth);
    authPass.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleAuth(); });

    // ──────────────────────────────────────────────────────────────
    //  কোর বাইপাস ফাংশন
    // ──────────────────────────────────────────────────────────────
    async function bypassUrl(targetUrl, moduleKey) {
        // মডিউল নির্বাচন
        let apis = BYPASS_MODULES.generic.apis;
        if (moduleKey && moduleKey !== 'auto' && BYPASS_MODULES[moduleKey]) {
            apis = BYPASS_MODULES[moduleKey].apis;
        } else if (moduleKey === 'auto') {
            // অটো ডিটেক্ট
            for (const [key, mod] of Object.entries(BYPASS_MODULES)) {
                if (mod.match && mod.match.some(m => targetUrl.includes(m))) {
                    apis = mod.apis;
                    break;
                }
            }
        }

        // কাস্টম API থাকলে যোগ করি
        const custom = customApi.value.trim();
        if (custom) {
            apis = [custom, ...apis];
        }

        // প্রতিটি API ট্রাই
        for (const apiTemplate of apis) {
            try {
                const apiUrl = apiTemplate.replace('{URL}', encodeURIComponent(targetUrl));
                addLog(`Trying: ${apiUrl}`, 'info');
                const response = await fetch(apiUrl, {
                    headers: {
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                    }
                });
                if (!response.ok) continue;
                const data = await response.json();
                // বিভিন্ন রেসপন্স ফরম্যাট
                if (data.destination) return { success: true, destination: data.destination, api: apiUrl };
                if (data.url) return { success: true, destination: data.url, api: apiUrl };
                if (data.result && data.result.startsWith('http')) return { success: true, destination: data.result, api: apiUrl };
                if (data.bypassed && data.bypassed.startsWith('http')) return { success: true, destination: data.bypassed, api: apiUrl };
            } catch (e) {
                continue;
            }
        }

        // HTML পার্স করে লিংক খোঁজা
        try {
            addLog('Attempting HTML parsing...', 'warn');
            const resp = await fetch(targetUrl, {
                headers: {
                    'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                }
            });
            const html = await resp.text();
            const patterns = [
                /window\.location\s*=\s*['"]([^'"]+)['"]/,
                /window\.location\.href\s*=\s*['"]([^'"]+)['"]/,
                /top\.location\s*=\s*['"]([^'"]+)['"]/,
                /data-url=["']([^"']+)["']/,
                /class="[^"]*download[^"]*"\s*href="([^"]+)"/,
                /href="([^"]+)"[^>]*class="[^"]*btn[^"]*download/
            ];
            for (const pattern of patterns) {
                const match = html.match(pattern);
                if (match && match[1] && match[1].startsWith('http')) {
                    return { success: true, destination: match[1], method: 'HTML Parse' };
                }
            }
        } catch (e) {}

        return { success: false, error: 'All bypass methods exhausted.' };
    }

    // ──────────────────────────────────────────────────────────────
    //  ইন্সপেক্ট ফাংশন
    // ──────────────────────────────────────────────────────────────
    async function inspectUrl(targetUrl) {
        const info = {
            url: targetUrl,
            timestamp: new Date().toISOString(),
            status: null,
            headers: {},
            redirects: [],
            cookies: []
        };
        try {
            const resp = await fetch(targetUrl, {
                redirect: 'manual',
                headers: {
                    'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                }
            });
            info.status = resp.status;
            info.headers = Object.fromEntries(resp.headers);
            let redirectUrl = resp.headers.get('location');
            let depth = 0;
            while (redirectUrl && depth < 5) {
                info.redirects.push(redirectUrl);
                const r = await fetch(redirectUrl, { redirect: 'manual' });
                redirectUrl = r.headers.get('location');
                depth++;
            }
            // কুকিজ (সাধারণত document.cookie থেকে, কিন্তু fetch-এ পাব না)
            // ব্রাউজারে document.cookie ব্যবহার করতে হবে, কিন্তু এখানে শুধু API থেকে পাচ্ছি
        } catch (e) {
            info.error = e.message;
        }
        return info;
    }

    // ──────────────────────────────────────────────────────────────
    //  বিওয়াইপাস হ্যান্ডলার
    // ──────────────────────────────────────────────────────────────
    async function handleBypass() {
        const url = urlInput.value.trim();
        if (!url) {
            addLog('Error: No URL provided.', 'error');
            return;
        }
        if (!url.startsWith('http://') && !url.startsWith('https://')) {
            addLog('Error: Invalid URL format. Must start with http:// or https://', 'error');
            return;
        }

        // রেজাল্ট বক্স হাইড
        resultBox.classList.remove('active');
        clearLog();
        addLog(`Target: ${url}`, 'info');

        const moduleKey = moduleSelect.value;
        addLog(`Module: ${moduleKey}`, 'info');

        // স্টার্ট টাইম
        const start = Date.now();

        const result = await bypassUrl(url, moduleKey);

        const elapsed = ((Date.now() - start) / 1000).toFixed(2);

        if (result.success) {
            addLog(`✅ Bypass successful! (${elapsed}s)`, 'success');
            addLog(`Destination: ${result.destination}`, 'success');
            if (result.api) addLog(`API: ${result.api}`, 'info');
            if (result.method) addLog(`Method: ${result.method}`, 'info');

            resultUrl.textContent = result.destination;
            resultBox.classList.add('active');
            openBtn.href = result.destination;
            statusText.textContent = 'Done';
            statusDot.className = 'dot green';

            // হিস্টোরি সেভ (লোকাল স্টোরেজ)
            saveHistory(url, result.destination);

        } else {
            addLog(`❌ Bypass failed: ${result.error || 'Unknown error'}`, 'error');
            statusText.textContent = 'Failed';
            statusDot.className = 'dot red';
        }
    }

    // ──────────────────────────────────────────────────────────────
    //  হিস্টোরি ম্যানেজমেন্ট (LocalStorage)
    // ──────────────────────────────────────────────────────────────
    function saveHistory(original, resolved) {
        try {
            let history = JSON.parse(localStorage.getItem('hex_history') || '[]');
            history.unshift({
                original,
                resolved,
                timestamp: new Date().toISOString()
            });
            if (history.length > 100) history = history.slice(0, 100);
            localStorage.setItem('hex_history', JSON.stringify(history));
        } catch (e) {}
    }

    function loadHistory() {
        try {
            const data = localStorage.getItem('hex_history');
            if (data) {
                const history = JSON.parse(data);
                if (history.length > 0) {
                    addLog(`Loaded ${history.length} history entries.`, 'info');
                }
            }
        } catch (e) {}
    }

    // ──────────────────────────────────────────────────────────────
    //  ইন্সপেক্ট হ্যান্ডলার
    // ──────────────────────────────────────────────────────────────
    async function handleInspect() {
        const url = urlInput.value.trim();
        if (!url) return;

        clearLog();
        addLog(`Inspecting: ${url}`, 'info');
        const data = await inspectUrl(url);

        addLog(`Status: ${data.status || 'N/A'}`, 'info');
        if (data.headers && data.headers.server) {
            addLog(`Server: ${data.headers.server}`, 'info');
        }
        if (data.headers && data.headers['content-type']) {
            addLog(`Content-Type: ${data.headers['content-type']}`, 'info');
        }
        if (data.redirects && data.redirects.length > 0) {
            addLog(`Redirect chain (${data.redirects.length} hops):`, 'warn');
            data.redirects.forEach((r, i) => {
                addLog(`  Hop ${i+1}: ${r}`, 'info');
            });
        } else {
            addLog('No redirects detected.', 'info');
        }
        if (data.error) {
            addLog(`Error: ${data.error}`, 'error');
        }
        statusText.textContent = 'Inspected';
        statusDot.className = 'dot green';
    }

    // ──────────────────────────────────────────────────────────────
    //  ইভেন্ট লিসেনার
    // ──────────────────────────────────────────────────────────────
    bypassBtn.addEventListener('click', handleBypass);

    inspectBtn.addEventListener('click', handleInspect);

    clearBtn.addEventListener('click', () => {
        urlInput.value = '';
        clearLog();
        resultBox.classList.remove('active');
        addLog('Cleared.', 'info');
    });

    // কপি বাটন
    copyBtn.addEventListener('click', () => {
        const text = resultUrl.textContent;
        if (text) {
            navigator.clipboard.writeText(text).then(() => {
                copyBtn.textContent = '✅ COPIED';
                setTimeout(() => { copyBtn.textContent = '📋 COPY'; }, 2000);
            }).catch(() => {
                // ফ্যালব্যাক
                const range = document.createRange();
                range.selectNode(resultUrl);
                window.getSelection().removeAllRanges();
                window.getSelection().addRange(range);
                document.execCommand('copy');
                copyBtn.textContent = '✅ COPIED';
                setTimeout(() => { copyBtn.textContent = '📋 COPY'; }, 2000);
            });
        }
    });

    // এন্টার কী সাপোর্ট (URL ইনপুট)
    urlInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleBypass();
        }
    });

    // কুইক টেস্ট লিংক (প্রি-লোডেড)
    // যদি ইউজার চায়, আগের লিংক রাখা
    // ──────────────────────────────────────────────────────────────
    //  ইনিশিয়ালাইজেশন
    // ──────────────────────────────────────────────────────────────
    // লোড হওয়ার পর অটো ফোকাস
    window.addEventListener('load', () => {
        if (authScreen.style.display !== 'none') {
            authPass.focus();
        } else {
            urlInput.focus();
        }
        // হিস্টোরি লোড
        loadHistory();
        addLog('HEX BYPASS v3.0 initialized.', 'info');
    });

    // যদি আগে থেকে আনলক করা থাকে (ডেভেলপমেন্টে)
    // (অথবা রিমোট থেকে লোড করার সময়)
    // আমরা চাইলে কুইক আনলক এড করতে পারি, কিন্তু সেটা ইউজারের পছন্দ
    console.log('HEX BYPASS loaded successfully.');
</script>
</body>
</html>
